# FinGuardX — Spring Boot Configuration
# SRS §6.2: Spring Boot backend configuration

# ── Server ────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/
spring.application.name=finguardx-backend

# ── Database (PostgreSQL) ─────────────────────────────────────────────────
# SRS §6.3: PostgreSQL primary relational database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finguardx}
spring.datasource.username=${DB_USER:finguardx}
spring.datasource.password=${DB_PASSWORD:finguardx_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────
# SRS §5: JWT-based authentication with session timeout
app.jwt.secret=${JWT_SECRET:finguardx-dev-secret-change-in-production-min-32-chars}
app.jwt.access-token-expiry-minutes=60
app.jwt.refresh-token-expiry-days=7

# ── Risk Engine (Python) Integration ─────────────────────────────────────
app.risk-engine.url=${RISK_ENGINE_URL:http://localhost:8081}
app.risk-engine.timeout-seconds=2

# ── Multi-tenancy ─────────────────────────────────────────────────────────
# SRS §5: Minimum 5 concurrent organizations
app.tenancy.min-tenants=5
app.tenancy.session-timeout-minutes=60

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.finguardx=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── CORS ──────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Actuator (health endpoint) ────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
