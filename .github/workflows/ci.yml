name: FinGuardX CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Python Backend + Risk Engine Tests ─────────────────────────────────────
  python-tests:
    name: Python Backend & Risk Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flask PyJWT numpy pandas scikit-learn joblib

      - name: Train risk model
        run: |
          cd risk-engine
          python risk_engine.py train

      - name: Run Python test suite (72 tests)
        run: |
          cd backend
          cp ../risk-engine/risk_engine.py .
          mkdir -p model
          cp -r ../risk-engine/model/. model/
          python test_finguardx.py

      - name: Verify model accuracy ≥ 85%
        run: |
          cd risk-engine
          python -c "
          import json
          with open('model/eval_results.json') as f:
              r = json.load(f)
          acc = r['accuracy'] * 100
          print(f'Model accuracy: {acc:.2f}%')
          assert acc >= 85, f'Accuracy {acc:.2f}% below 85% SRS target'
          print('PASS: Accuracy target met')
          "

  # ── Spring Boot Tests ────────────────────────────────────────────────────────
  spring-tests:
    name: Spring Boot (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Spring Boot tests
        run: |
          cd spring-backend
          mvn test -q

  # ── Docker Build Validation ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t finguardx-backend ./backend

      - name: Build frontend image
        run: docker build -t finguardx-frontend ./frontend
